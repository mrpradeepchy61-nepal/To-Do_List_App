<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo | Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a class="active" href="todo.html">Todo</a>
      <a href="about.html">About Me</a>
    </nav>

    <section class="todo-container">
      <h1>My Todo List</h1>
      <p class="subtitle">Plan your day, one task at a time.</p>

      <div class="input-box">
        <input type="text" id="taskInput" placeholder="Write a new task..." />
        <button id="addBtn">Add Task</button>
      </div>

      <p class="task-stats">
        Total: <span id="totalTasks">0</span> |
        Completed: <span id="completedTasks">0</span>
      </p>

      <ul id="taskList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
